<!DOCTYPE html>
<html lang="en">

<head>
  <title>T18-validation</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<!--*************************************************************
  BODY
**************************************************************-->

<body>
  <h1>T18-validation</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <p><br><br><i>Copy your HTML from the last task and keep building.</i><br><br><br><br></p>
<form onsubmit="return false;">
    <label for="formName">Age:</label>
    <input type="number" id="ageField" name="formName" min="1" max="99" >
    <input type="submit" onClick="getAgeInput()">
  </form>
  <form onsubmit="return false;">
    <label for="formName">Name:</label>
    <input type="text" id="nameField" name="formName" placeholder="Your Name" required>
    <input type="submit" onClick="getNameInput()">
  </form>

  <form onsubmit="return false;">
    <label for="formName">Pocket Money:</label>
    <input type="text" id="moneyField" name="formName">
    <input type="submit" onClick="getMoneyInput()">
  </form>
   <form onsubmit="return false;">
    <label for="formName">How much do you like chocolate?</label>
    <input type="text" id="choiceField" name="formName">
    <input type="submit" onClick="getChoiceInput()">
  </form>
  <form onsubmit="return false;">
    <label for="formName">How many bottles of Coke?</label>
    <input type="text" id="cokeField" name="formName">
    <input type="submit" onClick="getDrinkInput()">
  </form>
  <form onsubmit="return false;">
    <label for="formName">What do you want from the shop?</label>
    <input type="text" id="listField" name="formName" placeholder="Food">
    <input type="submit" onClick="getListInput()">
  </form>
 <button onclick="start()">Start</button>
  <div id="JavaScriptOutput">

    The output of your script will go here.

  </div>


  <script src="../t18_validation.js"></script>

</body>

</html>

  END OF T18_VALIDATION.HTML
**************************************************************-->
